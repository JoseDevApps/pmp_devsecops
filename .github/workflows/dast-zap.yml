name: DAST ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL del entorno de staging (ej: https://staging.tu-dominio.com)"
        required: true
      service:
        description: "Servicio objetivo (web/api)"
        required: true
        default: "web"

permissions:
  contents: read
  issues: write

jobs:
  zap-scan:
    name: OWASP ZAP Baseline — ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: true
          allow_issue_writing: false
          cmd_options: "-a"

      - name: Upload reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ inputs.service }}-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30
