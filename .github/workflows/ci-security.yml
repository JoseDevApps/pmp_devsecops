name: CI Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  workflow-security:
    name: Workflow lint (actionlint + zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: raven-actions/actionlint@v2
      - uses: zizmorcore/zizmor-action@v0.1.1
        with:
          persona: pedantic

  secrets-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-web:
    name: Tests — service-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pmp_test
          POSTGRES_PASSWORD: pmp_test
          POSTGRES_DB: pmp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/web/requirements.txt
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r services/web/requirements.txt
          pip install pytest pytest-django ruff bandit
      - name: Lint ruff
        run: ruff check services/web/
      - name: Tests Django web
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "1"
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: pmp_test
          SQL_USER: pmp_test
          SQL_PASSWORD: pmp_test
          SQL_HOST: localhost
          SQL_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          USE_MINIO: "0"
        run: pytest services/web/ -q --tb=short
        working-directory: .

  test-api:
    name: Tests — service-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pmp_test
          POSTGRES_PASSWORD: pmp_test
          POSTGRES_DB: pmp_test_api
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements.txt
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt
          pip install pytest pytest-django ruff
      - name: Lint ruff
        run: ruff check services/api/
      - name: Tests Django API
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "1"
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: pmp_test_api
          SQL_USER: pmp_test
          SQL_PASSWORD: pmp_test
          SQL_HOST: localhost
          SQL_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
        run: pytest services/api/ -q --tb=short

  sast-codeql:
    name: SAST — CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: codeql-python

  sast-semgrep:
    name: SAST — Semgrep OWASP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          semgrep ci \
            --sarif \
            --output semgrep.sarif \
            || true
        env:
          SEMGREP_RULES: >-
            p/owasp-top-ten
            p/security-audit
            p/django
            p/python
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-scan:
    name: SCA — OSV Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: google/osv-scanner-action/osv-scanner-action@v2.0.3
        with:
          scan-args: |-
            --recursive
            --format sarif
            --output osv.sarif
            .
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv.sarif
          category: osv

  docker-build-scan:
    name: Docker build + Trivy scan (todos los servicios)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service: [web, api, ws, worker]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - name: Build imagen ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          load: true
          tags: pmp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: pmp-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
