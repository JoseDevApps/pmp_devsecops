name: Release Container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      service:
        description: "Servicio a publicar (web/api/ws/worker/all)"
        required: true
        default: "all"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  release-service:
    name: Release — ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: [web, api, ws, worker]
    outputs:
      digest-${{ matrix.service }}: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/pmp-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy scan release
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/pmp-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-release-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-release-${{ matrix.service }}.sarif
          category: trivy-release-${{ matrix.service }}

      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/pmp-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload artefactos de seguridad
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-${{ matrix.service }}-${{ github.sha }}
          path: "*.sarif"
          retention-days: 90
