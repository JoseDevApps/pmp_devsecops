# docker-compose.yml — Entorno de desarrollo local
# Para producción usar docker-compose.prod.yml
# Ejecutar: docker compose up --build

services:

  # ---- Servicio Web (Django core: dashboard, public, registration) ----
  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: pmp-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "8050:8000"
    volumes:
      - ./services/web:/app
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ---- Servicio API (REST API independiente) ----
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: pmp-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8051:8001"
    volumes:
      - ./services/api:/app
    command: python manage.py runserver 0.0.0.0:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Servicio WebSocket / Notificaciones (Django Channels) ----
  ws:
    build:
      context: ./services/ws
      dockerfile: Dockerfile
    container_name: pmp-ws
    restart: unless-stopped
    env_file: .env
    ports:
      - "8052:8002"
    volumes:
      - ./services/ws:/app
    command: daphne -b 0.0.0.0 -p 8002 config.asgi:application
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Worker Celery (tareas asíncronas) ----
  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: pmp-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./services/worker:/app
    command: celery -A config worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Nginx — API Gateway / Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: pmp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - ws

  # ---- PostgreSQL 15 ----
  db:
    image: postgres:15-alpine
    container_name: pmp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
      POSTGRES_DB: ${SQL_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: pmp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: pmp-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO init — crea bucket automáticamente ----
  minio-init:
    image: minio/mc:latest
    container_name: pmp-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-pmp-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET_NAME &&
      mc anonymous set none local/$$MINIO_BUCKET_NAME &&
      echo 'Bucket listo.' && exit 0
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
