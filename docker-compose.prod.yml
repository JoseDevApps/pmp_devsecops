# docker-compose.prod.yml — Configuración de producción
# Usar: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# NOTA: requiere TLS configurado en infra/nginx/nginx.prod.conf

services:

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      target: runtime
    restart: always
    env_file: .env
    volumes:
      - staticfiles:/app/staticfiles
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: runtime
    restart: always
    env_file: .env
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 2 --timeout 60

  ws:
    build:
      context: ./services/ws
      dockerfile: Dockerfile
      target: runtime
    restart: always
    env_file: .env
    command: daphne -b 0.0.0.0 -p 8002 config.asgi:application

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
      target: runtime
    restart: always
    env_file: .env
    command: celery -A config worker --loglevel=warning --concurrency=4

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - web
      - api
      - ws

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
      POSTGRES_DB: ${SQL_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  staticfiles:
